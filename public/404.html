<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – 页面未找到</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 3rem 4rem;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        max-width: 480px;
        width: 90%;
      }
      .emoji { font-size: 4rem; margin-bottom: 1rem; }
      h1 { font-size: 1.6rem; color: #1a73e8; margin-bottom: 0.5rem; }
      p  { color: #666; margin-bottom: 1.5rem; }
      a  {
        display: inline-block;
        background: #1a73e8;
        color: white;
        text-decoration: none;
        padding: 0.6rem 1.5rem;
        border-radius: 8px;
        font-size: 0.95rem;
        transition: background 0.15s;
      }
      a:hover { background: #1558b0; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji">📚</div>
      <h1>页面未找到</h1>
      <p>您访问的页面不存在，请返回首页浏览所有考纲幻灯片。</p>
      <a href="/slidev-exam-ppts/">返回首页</a>
    </div>
  </body>
</html>
