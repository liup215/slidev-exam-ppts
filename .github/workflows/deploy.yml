name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build VitePress first (outputs to docs/.vitepress/dist)
      - name: Build VitePress
        run: npx vitepress build docs

      # Build Slidev slides into the VitePress dist folder using absolute paths
      - name: Build CIE Biology 9700 slides (Chapter 1)
        run: |
          npx slidev build slides/cie-9700/slides.md \
            --base /slidev-exam-ppts/slides/cie-9700/ \
            --out ${{ github.workspace }}/docs/.vitepress/dist/slides/cie-9700

      - name: Build CIE Biology 9700 slides (Chapter 2)
        run: |
          npx slidev build slides/cie-9700/chapter-2/slides.md \
            --base /slidev-exam-ppts/slides/cie-9700/chapter-2/ \
            --out ${{ github.workspace }}/docs/.vitepress/dist/slides/cie-9700/chapter-2

      - name: Build Bio Competition Molecular Biology Chapter 7 slides
        run: |
          npx slidev build slides/bio-competition/molecular-biology-of-the-cell/chapter7/slides.md \
            --base /slidev-exam-ppts/slides/bio-competition/molecular-biology-of-the-cell/chapter7/ \
            --out ${{ github.workspace }}/docs/.vitepress/dist/slides/bio-competition/molecular-biology-of-the-cell/chapter7

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
